<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLSU Buildings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">
    <header class="header"></header>

    <div class="content">
      <aside class="sidebar">
        Navigation Side
      </aside>

      <figure class="interface">
        <nav class="building-nav" id="buildingNav"></nav>

        <p class="building-title" id="buildingTitle"></p>

        <div class="container">
            <div id="buildingContent"></div>

            <div id="mapContainer">
                <img src="./campus-map.jpg" id="campusMap">
            </div>

            <button class="marker" style="left:40%; top:25%;">   
            </button>

            
        </divdiv>

      </figure>
    </div>

    <footer class="footer"></footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
