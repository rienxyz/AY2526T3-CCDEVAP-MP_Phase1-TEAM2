<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimoFlow · Find Your Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="find-your-room.css" />
</head>
<body>

    <div class="container py-4">
        <!-- Page Header -->
        <div class="page-header mb-4">
            <h1><i class="bi bi-search me-2"></i>Find Your Room</h1>
            <p class="text-muted">Search for classrooms and buildings across the DLSU campus.</p>
        </div>

        <!-- Search Card -->
        <div class="card-custom">
            <div class="card-header-custom">
                <i class="bi bi-geo-alt me-2"></i>Search for a Room
            </div>
            <div class="p-4">
                <div class="from-select-row">
                    <label for="from-select">Where are you now?</label>
                    <select id="from-select">
                        <option value="">— Select your current location —</option>
                        <optgroup label="Gates">
                            <option value="Gate 1 (South)">Gate 1 (South)</option>
                            <option value="Gate 2 (North)">Gate 2 (North)</option>
                            <option value="Gate 3 (Velasco)">Gate 3 (Velasco)</option>
                            <option value="Gate 4A (Gokongwei)">Gate 4A (Gokongwei)</option>
                            <option value="Gate 5A (Andrew)">Gate 5A (Andrew)</option>
                            <option value="Gate 6 (Razon)">Gate 6 (Razon)</option>
                            <option value="Gate 7 (STRC)">Gate 7 (STRC)</option>
                            <option value="Gate 8 (Agno)">Gate 8 (Agno)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Enter room code (e.g. LS305) or building name" />
                    <button id="search-btn">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Card -->
        <div class="card-custom mt-4">
            <div class="card-header-custom">
                <i class="bi bi-list-ul me-2"></i>Results
            </div>
            <div class="p-3" id="results-area">
                <div class="text-center text-muted py-4">
                    <i class="bi bi-compass" style="font-size: 2.5rem;"></i>
                    <p class="mt-2">Enter a room code or building name to get directions.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="find-your-room.js"></script>
</body>
</html>
